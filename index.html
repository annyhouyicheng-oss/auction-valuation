<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>競拍股價即時評估系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1A1917;
    --text2: #6B6860;
    --text3: #A09D96;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --red: #791F1F;
    --red-bg: #FCEBEB;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --accent: #1A1917;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1D1A;
      --surface2: #272521;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text: #F0EEE8;
      --text2: #A09D96;
      --text3: #6B6860;
      --green: #5DCAA5;
      --green-bg: #04342C;
      --amber: #EF9F27;
      --amber-bg: #412402;
      --red: #F09595;
      --red-bg: #501313;
      --blue: #85B7EB;
      --blue-bg: #042C53;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .header-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .input-card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
  }
  .field-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .field input, .field select {
    height: 38px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 0 12px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select { cursor: pointer; }
  .btn-row { margin-top: 1.25rem; display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-primary {
    height: 40px;
    padding: 0 24px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    height: 40px;
    padding: 0 18px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--surface2); }

  .verdict {
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .verdict-icon { font-size: 22px; line-height: 1; margin-top: 2px; }
  .verdict-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .verdict-body { font-size: 13px; color: var(--text2); line-height: 1.7; }
  .verdict.safe { border-left: 3px solid var(--green); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
  .verdict.warn { border-left: 3px solid var(--amber); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
  .verdict.danger { border-left: 3px solid var(--red); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    vertical-align: middle;
  }
  .badge-safe { background: var(--green-bg); color: var(--green); }
  .badge-warn { background: var(--amber-bg); color: var(--amber); }
  .badge-danger { background: var(--red-bg); color: var(--red); }
  .badge-info { background: var(--blue-bg); color: var(--blue); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    margin-top: 1.5rem;
  }
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .metric {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-val { font-size: 20px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .price-table-wrap { overflow-x: auto; margin-bottom: 1.25rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 500; color: var(--text3); text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  .td-mono { font-family: 'DM Mono', monospace; font-weight: 500; }
  .row-safe .td-price { color: var(--green); font-weight: 700; }
  .row-warn .td-price { color: var(--amber); font-weight: 700; }
  .row-danger .td-price { color: var(--red); font-weight: 700; }
  .row-highlight { background: var(--surface2); }

  .excl-grid { display: flex; flex-direction: column; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
  .excl-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .excl-item:last-child { border-bottom: none; }
  .excl-icon { font-size: 15px; flex-shrink: 0; }
  .excl-pass { color: var(--green); }
  .excl-fail { color: var(--red); }

  .sell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .sell-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .sell-card.featured { border: 2px solid var(--blue); }
  .sell-card-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .sell-card-val { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; margin-bottom: 2px; }
  .sell-card.featured .sell-card-val { color: var(--blue); }
  .sell-card-sub { font-size: 11px; color: var(--text3); }

  .chart-wrap { position: relative; width: 100%; height: 280px; margin-bottom: 1.5rem; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .empty-state {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    color: var(--text3);
  }
  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .empty-body { font-size: 13px; line-height: 1.7; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 1.25rem 1rem 3rem; }
    .field-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    競拍評估系統
  </div>
  <div class="header-tag">Auction Valuation v1.0</div>
</header>

<main>
  <h1>競拍股價即時評估</h1>
  <p class="subtitle">依據競拍三層評估邏輯，輸入個股基本資料即時產出完整估值報告</p>

  <div class="input-card">
    <div class="input-card-title">基本資料</div>
    <div class="field-grid">
      <div class="field" style="grid-column: span 2;">
        <label>股票名稱</label>
        <input id="stkName" type="text" placeholder="例：三集瑞-KY" />
      </div>
      <div class="field"><label>起標價（底價）</label><input id="inFloor" type="number" placeholder="364.54" step="0.01" /></div>
      <div class="field"><label>承銷價</label><input id="inIssue" type="number" placeholder="433.8" step="0.01" /></div>
      <div class="field"><label>目前市價</label><input id="inMarket" type="number" placeholder="550" step="0.01" /></div>
      <div class="field"><label>EPS（年度）</label><input id="inEps" type="number" placeholder="7.78" step="0.01" /></div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-card-title">本益比參考</div>
    <div class="field-grid">
      <div class="field"><label>產業本益比（平均）</label><input id="inPeAvg" type="number" placeholder="20" step="0.01" /></div>
      <div class="field"><label>產業本益比（中位數）</label><input id="inPeMed" type="number" placeholder="14.6" step="0.01" /></div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-card-title">競拍後檢討（選填）</div>
    <div class="field-grid">
      <div class="field"><label>實際得標均價</label><input id="inWon" type="number" placeholder="474" step="0.01" /></div>
      <div class="field"><label>得標成本（含費用～5%）</label><input id="inCost" type="number" placeholder="自動計算" step="0.01" /></div>
    </div>
  </div>

  <div class="input-card">
    <div class="input-card-title">篩選條件</div>
    <div class="field-grid">
      <div class="field">
        <label>日均量 ＞ 150？</label>
        <select id="inVol">
          <option value="1">是（符合）</option>
          <option value="0">否（排除）</option>
        </select>
      </div>
      <div class="field">
        <label>本益比 ≤ 20（產業均值）？</label>
        <select id="inPeOk">
          <option value="1">是（符合）</option>
          <option value="0">否（偏高排除）</option>
        </select>
      </div>
      <div class="field">
        <label>面額 ≥ 10 元（興櫃前）？</label>
        <select id="inParOk">
          <option value="1">是（符合）</option>
          <option value="0">否（排除）</option>
        </select>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="calculate()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/></svg>
      立即評估
    </button>
    <button class="btn-secondary" onclick="resetAll()">清除重填</button>
  </div>

  <div id="result">
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <p class="empty-title">尚無評估結果</p>
      <p class="empty-body">填入股票基本資料後<br>點擊「立即評估」產生完整報告</p>
    </div>
  </div>
</main>

<footer>競拍股價評估系統 — 僅供參考，不構成投資建議 &nbsp;|&nbsp; 本益比排除條件依各產業調整</footer>

<script>
let chartInst = null;

function n(id) { return parseFloat(document.getElementById(id).value) || 0; }
function f(v, d=2) { if (!v || isNaN(v)) return '—'; return Number(v).toFixed(d); }
function fm(v) { if (!v || isNaN(v)) return '—'; return 'NT$' + Number(v).toFixed(2); }

function resetAll() {
  ['stkName','inFloor','inIssue','inMarket','inEps','inPeAvg','inPeMed','inWon','inCost'].forEach(id => {
    document.getElementById(id).value = '';
  });
  ['inVol','inPeOk','inParOk'].forEach(id => {
    document.getElementById(id).value = '1';
  });
  document.getElementById('result').innerHTML = `
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <p class="empty-title">尚無評估結果</p>
      <p class="empty-body">填入股票基本資料後<br>點擊「立即評估」產生完整報告</p>
    </div>`;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
}

function calculate() {
  const name = document.getElementById('stkName').value.trim() || '該股';
  const floor = n('inFloor');
  const issue = n('inIssue');
  const market = n('inMarket');
  const eps = n('inEps');
  const peAvg = n('inPeAvg');
  const peMed = n('inPeMed');
  const wonRaw = n('inWon');
  const costInput = n('inCost');
  const volOk = document.getElementById('inVol').value === '1';
  const peOk = document.getElementById('inPeOk').value === '1';
  const parOk = document.getElementById('inParOk').value === '1';

  if (!floor) { alert('請填入起標價（底價）'); return; }

  const won = wonRaw || 0;
  const cost = costInput || (won ? +(won * 1.05).toFixed(4) : 0);

  // Price anchors
  const v12 = floor * 1.2;
  const v13 = floor * 1.3;
  const v14 = floor * 1.4;
  const v15 = floor * 1.5;
  const v18 = floor * 1.8;
  const v20 = floor * 2.0;
  const vm75 = market ? market * 0.75 : null;
  const vm80 = market ? market * 0.80 : null;
  const vm82 = market ? market * 0.82 : null;
  const vi20 = issue ? issue + 20 : null;
  const vi30 = issue ? issue + 30 : null;

  const waterlogged = market > 0 && market > v18;

  const excl = [
    { label: '日均量（過去6個月）> 150', pass: volOk },
    { label: '產業本益比均值 ≤ 20', pass: peOk },
    { label: '市價未灌水（≤ 起標×1.8）', pass: !waterlogged },
    { label: '興櫃前面額 ≥ 10 元', pass: parOk },
  ];
  const excluded = excl.some(e => !e.pass);

  const wonRatio = won > 0 ? won / floor : null;
  const sell115 = won ? won * 1.15 : null;
  const sell121 = won ? won * 1.21 : null;
  const sellCost115 = cost ? cost * 1.15 : null;
  const sellCost160 = cost ? cost * 1.60 : null;

  const priceByPeAvg = eps > 0 && peAvg > 0 ? eps * peAvg : null;
  const priceByPeMed = eps > 0 && peMed > 0 ? eps * peMed : null;
  const peStock = eps > 0 && market > 0 ? market / eps : null;

  // Verdict
  let verdictClass, verdictIcon, verdictTitle, verdictBody;
  if (excluded) {
    verdictClass = 'danger';
    verdictIcon = '✕';
    verdictTitle = `建議排除：${name}`;
    const reasons = excl.filter(e => !e.pass).map(e => e.label).join('、');
    verdictBody = `依競拍篩選規則，以下條件不符：<strong>${reasons}</strong>。建議跳過此次競拍。`;
  } else if (wonRatio && wonRatio > 1.6) {
    verdictClass = 'warn';
    verdictIcon = '△';
    verdictTitle = `謹慎：${name} 得標均價偏高`;
    verdictBody = `得標均價為起標價的 <strong>${wonRatio.toFixed(2)} 倍</strong>，已超出建議區間（×1.5）。賣出策略建議以得標成本×1.15為目標，嚴格控制持倉風險。`;
  } else if (wonRatio && wonRatio <= 1.3) {
    verdictClass = 'safe';
    verdictIcon = '◎';
    verdictTitle = `優質：${name} 得標價位理想`;
    verdictBody = `得標均價為起標價的 <strong>${wonRatio.toFixed(2)} 倍</strong>，處於理想區間。若屬低本益比、高EPS、KY股，可考慮以得標成本×1.6為賣出目標。`;
  } else {
    verdictClass = 'warn';
    verdictIcon = '○';
    verdictTitle = `一般：${name} 在合理範圍內`;
    verdictBody = `各項指標在正常範圍。建議以得標均價×<strong>1.15～1.21</strong>作為掛牌前5日賣出目標，注意市場動能。`;
  }

  // Build chart data
  const chartLabels = ['×1.2', '×1.3', '×1.4', '×1.5\n上限', '×1.8\n灌水', '×2.0\n絕對'];
  const chartData = [v12, v13, v14, v15, v18, v20];
  const chartColors = ['#1D9E75','#1D9E75','#1D9E75','#BA7517','#E24B4A','#A32D2D'];

  const html = `
    <div class="section-label" style="margin-top:0;">綜合評估裁定</div>
    <div class="verdict ${verdictClass}">
      <div class="verdict-icon">${verdictIcon}</div>
      <div>
        <div class="verdict-title">${verdictTitle}</div>
        <div class="verdict-body">${verdictBody}</div>
      </div>
    </div>

    <div class="section-label">篩選資格檢核</div>
    <div class="excl-grid">
      ${excl.map(e => `
        <div class="excl-item">
          <span class="excl-icon ${e.pass ? 'excl-pass' : 'excl-fail'}">${e.pass ? '✓' : '✕'}</span>
          <span style="${e.pass ? '' : 'color:var(--red);'}">${e.label}</span>
          <span class="badge ${e.pass ? 'badge-safe' : 'badge-danger'}" style="margin-left:auto;">${e.pass ? '符合' : '不符'}</span>
        </div>`).join('')}
    </div>

    <div class="section-label">核心估值區間 — ${name}</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">起標價（底價）</div><div class="metric-val">${f(floor)}</div><div class="metric-sub">NT$</div></div>
      <div class="metric"><div class="metric-label">承銷價</div><div class="metric-val">${issue ? f(issue) : '—'}</div><div class="metric-sub">NT$</div></div>
      <div class="metric"><div class="metric-label">目前市價</div><div class="metric-val">${market ? f(market) : '—'}</div><div class="metric-sub">${waterlogged ? '⚠ 灌水' : '正常'}</div></div>
      <div class="metric"><div class="metric-label">建議競拍上限</div><div class="metric-val">${f(v15)}</div><div class="metric-sub">起標 ×1.5</div></div>
    </div>

    <div class="section-label">詳細定價錨點</div>
    <div class="price-table-wrap">
    <table>
      <thead><tr><th>錨點</th><th>價格（NT$）</th><th>評級</th><th>說明</th></tr></thead>
      <tbody>
        <tr class="row-safe"><td>起標 ×1.2</td><td class="td-mono td-price">${f(v12)}</td><td><span class="badge badge-safe">保守</span></td><td style="color:var(--text2);font-size:12px;">謹慎起標</td></tr>
        <tr class="row-safe"><td>起標 ×1.3</td><td class="td-mono td-price">${f(v13)}</td><td><span class="badge badge-safe">理想下限</span></td><td style="color:var(--text2);font-size:12px;">估值區間下緣</td></tr>
        <tr class="row-safe"><td>起標 ×1.4</td><td class="td-mono td-price">${f(v14)}</td><td><span class="badge badge-safe">理想上限</span></td><td style="color:var(--text2);font-size:12px;">估值區間上緣</td></tr>
        <tr class="row-warn row-highlight"><td>起標 ×1.5</td><td class="td-mono td-price">${f(v15)}</td><td><span class="badge badge-warn">建議不超過</span></td><td style="color:var(--text2);font-size:12px;">競拍上限警示</td></tr>
        ${vm75 ? `<tr><td>市價 ×0.75</td><td class="td-mono">${f(vm75)}</td><td><span class="badge badge-safe">市價折扣</span></td><td style="color:var(--text2);font-size:12px;">低折扣參考</td></tr>` : ''}
        ${vm80 ? `<tr><td>市價 ×0.80</td><td class="td-mono">${f(vm80)}</td><td><span class="badge badge-safe">市價折扣</span></td><td style="color:var(--text2);font-size:12px;">中折扣參考</td></tr>` : ''}
        ${vm82 ? `<tr><td>市價 ×0.82</td><td class="td-mono">${f(vm82)}</td><td><span class="badge badge-warn">市價折扣</span></td><td style="color:var(--text2);font-size:12px;">高折扣參考</td></tr>` : ''}
        ${vi20 ? `<tr><td>承銷價 +20</td><td class="td-mono">${f(vi20)}</td><td></td><td style="color:var(--text2);font-size:12px;">承銷加減法</td></tr>` : ''}
        ${vi30 ? `<tr><td>承銷價 +30</td><td class="td-mono">${f(vi30)}</td><td></td><td style="color:var(--text2);font-size:12px;">承銷加減法</td></tr>` : ''}
        <tr class="row-warn"><td>起標 ×1.8</td><td class="td-mono td-price">${f(v18)}</td><td><span class="badge badge-warn">灌水警戒</span></td><td style="color:var(--text2);font-size:12px;">市價超過視為灌水</td></tr>
        <tr class="row-danger"><td>起標 ×2.0</td><td class="td-mono td-price">${f(v20)}</td><td><span class="badge badge-danger">絕對不超過</span></td><td style="color:var(--text2);font-size:12px;">競拍絕對上限</td></tr>
      </tbody>
    </table>
    </div>

    ${eps > 0 ? `
    <div class="section-label">本益比法估值</div>
    <div class="metric-grid">
      ${peStock ? `<div class="metric"><div class="metric-label">目前本益比</div><div class="metric-val">${f(peStock,1)}</div><div class="metric-sub">市價 ÷ EPS</div></div>` : ''}
      ${priceByPeAvg ? `<div class="metric"><div class="metric-label">均值本益比估價</div><div class="metric-val">${f(priceByPeAvg)}</div><div class="metric-sub">EPS × ${f(peAvg,1)}</div></div>` : ''}
      ${priceByPeMed ? `<div class="metric"><div class="metric-label">中位數本益比估價</div><div class="metric-val">${f(priceByPeMed)}</div><div class="metric-sub">EPS × ${f(peMed,1)}</div></div>` : ''}
      <div class="metric"><div class="metric-label">保守估價（PE×7折）</div><div class="metric-val">${f(eps * peAvg * 0.7)}</div><div class="metric-sub">折扣後參考</div></div>
    </div>` : ''}

    ${won > 0 ? `
    <div class="section-label">競拍後 — 賣出策略</div>
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">得標均價</div><div class="metric-val">${f(won)}</div><div class="metric-sub">起標 ×${wonRatio ? wonRatio.toFixed(2) : '—'}</div></div>
      <div class="metric"><div class="metric-label">得標成本（含費）</div><div class="metric-val">${f(cost)}</div><div class="metric-sub">約含5%費用</div></div>
    </div>
    <div class="sell-grid">
      <div class="sell-card"><div class="sell-card-label">一般目標 — 均價×1.15</div><div class="sell-card-val">${f(sell115)}</div><div class="sell-card-sub">掛牌前5日</div></div>
      <div class="sell-card"><div class="sell-card-label">一般目標 — 均價×1.21</div><div class="sell-card-val">${f(sell121)}</div><div class="sell-card-sub">掛牌前5日上限</div></div>
      <div class="sell-card"><div class="sell-card-label">保守目標 — 成本×1.15</div><div class="sell-card-val">${f(sellCost115)}</div><div class="sell-card-sub">穩健獲利出場</div></div>
      <div class="sell-card featured"><div class="sell-card-label">優質目標 — 成本×1.6</div><div class="sell-card-val">${f(sellCost160)}</div><div class="sell-card-sub">低PE、高EPS、KY適用</div></div>
    </div>` : ''}

    <div class="section-label">估值錨點視覺化</div>
    <div class="chart-legend">
      <span class="leg"><span class="leg-dot" style="background:#1D9E75"></span>安全區間</span>
      <span class="leg"><span class="leg-dot" style="background:#BA7517"></span>警示區間</span>
      <span class="leg"><span class="leg-dot" style="background:#E24B4A"></span>排除區間</span>
      ${won ? `<span class="leg"><span class="leg-dot" style="background:#378ADD;border-radius:0;height:3px;width:18px;"></span>得標均價</span>` : ''}
    </div>
    <div class="chart-wrap">
      <canvas id="priceChart" role="img" aria-label="${name} 競拍估值各錨點價格比較橫條圖">${name} 估值區間比較：保守 ${f(v12)}、理想上限 ${f(v14)}、建議上限 ${f(v15)}、灌水警戒 ${f(v18)}。</canvas>
    </div>
  `;

  document.getElementById('result').innerHTML = html;

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const datasets = [{
    label: '估值錨點',
    data: chartData,
    backgroundColor: chartColors,
    borderWidth: 0,
    borderRadius: 4,
  }];

  if (won) {
    datasets.push({
      label: '得標均價',
      data: chartData.map(() => won),
      type: 'line',
      borderColor: '#378ADD',
      borderWidth: 2,
      borderDash: [6, 4],
      pointRadius: 0,
      fill: false,
      tension: 0,
    });
  }

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#6B6860' : '#A09D96';

  chartInst = new Chart(document.getElementById('priceChart'), {
    type: 'bar',
    data: { labels: chartLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' NT$' + (ctx.parsed.y || 0).toFixed(2)
          }
        }
      },
      scales: {
        x: {
          ticks: { color: tickColor, font: { size: 11, family: "'DM Mono', monospace" } },
          grid: { display: false }
        },
        y: {
          ticks: { color: tickColor, font: { size: 11, family: "'DM Mono', monospace" }, callback: v => 'NT$' + Number(v).toFixed(0) },
          grid: { color: gridColor }
        }
      }
    }
  });
}
</script>
</body>
</html>
